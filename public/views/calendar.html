<!-- /public/views/calendario.html -->

<div class="calendar-container">
  <!-- Header -->
  <header class="calendar-header" role="region" aria-label="Encabezado del calendario">
    <div class="calendar-title">
      <div class="calendar-icon" aria-hidden="true">
        <i class="fa-solid fa-calendar-days"></i>
      </div>
      <div>
        <h1 class="section-title" style="margin:0">Calendario Académico</h1>
        <div class="calendar-date-display" id="currentDateDisplay">Cargando...</div>
      </div>
    </div>

    <nav class="calendar-nav" aria-label="Navegación de meses">
      <button class="nav-btn" id="prevBtn" title="Mes anterior">
        <i class="fa-solid fa-chevron-left"></i>
      </button>
      <button class="month-year-selector" id="monthYearSelector" title="Seleccionar mes y año">
        <span class="month-year-text" id="monthYearText">Diciembre 2024</span>
        <i class="fa-solid fa-chevron-down" aria-hidden="true"></i>
      </button>
      <button class="nav-btn" id="nextBtn" title="Mes siguiente">
        <i class="fa-solid fa-chevron-right"></i>
      </button>
      <button class="nav-btn" id="todayBtn" title="Ir a hoy">
        <i class="fa-solid fa-calendar-day"></i>
      </button>
    </nav>

    <div class="view-selector" role="tablist" aria-label="Cambiar vista">
      <button class="view-btn active" data-view="month" role="tab" aria-selected="true">Mes</button>
      <button class="view-btn" data-view="week" role="tab">Semana</button>
      <button class="view-btn" data-view="day" role="tab">Día</button>
      <button class="view-btn" data-view="agenda" role="tab">Agenda</button>
    </div>
  </header>

  <!-- Acciones rápidas -->
  <section class="quick-actions" role="region" aria-label="Acciones rápidas">
    <button class="quick-action-btn" id="quickAddExam" title="Agregar examen">
      <i class="fa-solid fa-file-lines" aria-hidden="true"></i> Agregar Examen
    </button>
    <button class="quick-action-btn" id="quickAddHomework" title="Agregar tarea">
      <i class="fa-solid fa-book" aria-hidden="true"></i> Agregar Tarea
    </button>
    <button class="quick-action-btn" id="quickAddProject" title="Agregar proyecto">
      <i class="fa-solid fa-diagram-project" aria-hidden="true"></i> Agregar Proyecto
    </button>
    <button class="quick-action-btn" id="quickAddStudySession" title="Nueva sesión de estudio">
      <i class="fa-solid fa-clock" aria-hidden="true"></i> Sesión de Estudio
    </button>
    <button class="quick-action-btn" id="exportCalendar" title="Exportar calendario">
      <i class="fa-solid fa-download" aria-hidden="true"></i> Exportar
    </button>
    <button class="quick-action-btn" id="printCalendar" title="Imprimir calendario">
      <i class="fa-solid fa-print" aria-hidden="true"></i> Imprimir
    </button>
  </section>

  <!-- Layout principal -->
  <div class="calendar-layout">
    <!-- Sidebar -->
    <aside class="calendar-sidebar" aria-label="Barra lateral">
      <!-- Mini calendario -->
      <section class="mini-calendar" role="region" aria-label="Mini calendario">
        <div class="mini-calendar-header">
          <span class="mini-calendar-title" id="miniCalendarTitle">Diciembre 2024</span>
          <div style="display:flex;gap:5px">
            <button class="nav-btn" id="miniPrevBtn" style="width:24px;height:24px" title="Mes anterior mini">
              <i class="fa-solid fa-chevron-left"></i>
            </button>
            <button class="nav-btn" id="miniNextBtn" style="width:24px;height:24px" title="Mes siguiente mini">
              <i class="fa-solid fa-chevron-right"></i>
            </button>
          </div>
        </div>
        <div class="mini-calendar-grid" id="miniCalendarGrid" aria-live="polite"></div>
      </section>

      <!-- Categorías -->
      <section class="categories-panel" role="region" aria-label="Materias / categorías">
        <div class="categories-title">
          <i class="fa-solid fa-tags" aria-hidden="true"></i>
          Materias
        </div>
        <div id="categoriesList"></div>
      </section>

      <!-- Próximos eventos -->
      <section class="upcoming-panel" role="region" aria-label="Próximos eventos">
        <div class="upcoming-title">
          <i class="fa-solid fa-clock" aria-hidden="true"></i>
          Próximos Eventos
        </div>
        <div id="upcomingEvents"></div>
      </section>
    </aside>

    <!-- Calendario principal -->
    <section class="calendar-main" id="calendarMain" role="region" aria-label="Vista del calendario">
      <!-- Se llena dinámicamente según la vista -->
    </section>
  </div>
</div>

<!-- Botón flotante -->
<button class="add-event-btn" id="addEventBtn" aria-label="Agregar evento">
  <i class="fa-solid fa-plus" aria-hidden="true"></i>
</button>

<!-- Modal de evento -->
<div class="event-modal" id="eventModal" aria-hidden="true" role="dialog" aria-labelledby="eventModalTitle">
  <div class="event-modal-content">
    <header class="event-modal-header">
      <h2 class="event-modal-title" id="eventModalTitle">Nuevo Evento</h2>
      <button class="event-modal-close" id="eventModalClose" aria-label="Cerrar">
        <i class="fa-solid fa-xmark" aria-hidden="true"></i>
      </button>
    </header>

    <div class="event-modal-body">
      <form id="eventForm">
        <input type="hidden" id="eventId" />

        <div class="form-group">
          <label class="form-label" for="eventTitle"><i class="fa-solid fa-heading"></i> Título del evento</label>
          <input type="text" class="form-input" id="eventTitle" placeholder="Ej: Examen de Cálculo" required />
        </div>

        <div class="form-group">
          <label class="form-label" for="eventDescription"><i class="fa-solid fa-align-left"></i> Descripción</label>
          <textarea class="form-textarea" id="eventDescription" rows="3" placeholder="Detalles del evento..."></textarea>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="eventCategory"><i class="fa-solid fa-bookmark"></i> Materia</label>
            <select class="form-select" id="eventCategory">
              <option value="math">Matemáticas</option>
              <option value="physics">Física</option>
              <option value="chemistry">Química</option>
              <option value="programming">Programación</option>
              <option value="languages">Idiomas</option>
              <option value="history">Historia</option>
              <option value="literature">Literatura</option>
              <option value="general">General</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label" for="eventType"><i class="fa-solid fa-tag"></i> Tipo</label>
            <select class="form-select" id="eventType">
              <option value="exam">Examen</option>
              <option value="homework">Tarea</option>
              <option value="project">Proyecto</option>
              <option value="study">Sesión de Estudio</option>
              <option value="class">Clase</option>
              <option value="meeting">Reunión</option>
              <option value="other">Otro</option>
            </select>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="eventDate"><i class="fa-solid fa-calendar"></i> Fecha</label>
            <input type="date" class="form-input" id="eventDate" required />
          </div>
          <div class="form-group">
            <label class="form-label" for="eventTime"><i class="fa-solid fa-clock"></i> Hora</label>
            <input type="time" class="form-input" id="eventTime" />
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="eventDuration"><i class="fa-solid fa-hourglass-half"></i> Duración</label>
            <select class="form-select" id="eventDuration">
              <option value="30">30 minutos</option>
              <option value="60" selected>1 hora</option>
              <option value="90">1.5 horas</option>
              <option value="120">2 horas</option>
              <option value="180">3 horas</option>
              <option value="240">4 horas</option>
              <option value="all-day">Todo el día</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label" for="eventPriority"><i class="fa-solid fa-flag"></i> Prioridad</label>
            <select class="form-select" id="eventPriority">
              <option value="low">Baja</option>
              <option value="medium" selected>Media</option>
              <option value="high">Alta</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="eventReminder"><i class="fa-solid fa-bell"></i> Recordatorio</label>
          <select class="form-select" id="eventReminder">
            <option value="none">Sin recordatorio</option>
            <option value="15">15 minutos antes</option>
            <option value="30">30 minutos antes</option>
            <option value="60">1 hora antes</option>
            <option value="1440">1 día antes</option>
            <option value="10080">1 semana antes</option>
          </select>
        </div>
      </form>
    </div>

    <footer class="event-modal-footer">
      <button class="btn btn-secondary" id="eventModalCancel">
        <i class="fa-solid fa-xmark" aria-hidden="true"></i> Cancelar
      </button>
      <button class="btn btn-primary" id="eventModalSave">
        <i class="fa-solid fa-floppy-disk" aria-hidden="true"></i> Guardar Evento
      </button>
    </footer>
  </div>
</div>
